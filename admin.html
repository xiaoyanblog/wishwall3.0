<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>标签墙后台入口</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="admin-shell gate-shell">
    <section class="hero-panel">
      <div>
        <p class="eyebrow">Wish Wall 2.0</p>
        <h1>标签墙后台管理</h1>
        <p class="hero-copy">输入正确管理口令后，会自动跳转到后台管理页面。口令错误时不会展示任何留言数据或管理表单。</p>
      </div>
      <a class="home-link" href="./index.html">返回标签墙</a>
    </section>

    <section class="login-panel gate-panel" id="loginPanel">
      <div>
        <h2>管理入口</h2>
        <p>请输入部署环境变量 <strong>ADMIN_TOKEN</strong> 对应的管理口令。</p>
        <p class="login-error" id="loginError" role="alert"></p>
      </div>
      <form class="login-form" id="loginForm">
        <input id="adminToken" type="password" placeholder="管理口令" autocomplete="current-password" required>
        <button id="loginButton" type="submit">进入后台</button>
      </form>
      <div class="login-captcha" id="loginCaptcha" hidden>
        <p id="loginCaptchaHint">请先完成验证码</p>
        <div class="captcha-widget" id="loginCaptchaWidget"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="./admin.js"></script>
</body>
</html>
